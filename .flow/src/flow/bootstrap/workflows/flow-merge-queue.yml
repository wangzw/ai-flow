name: flow-merge-queue
on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: flow-merge-queue
  cancel-in-progress: false

jobs:
  process:
    if: github.event.label.name == 'merge-queued'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ./.flow
      - name: Install Copilot CLI
        run: |
          npm install -g @github/copilot || npm install -g @githubnext/github-copilot-cli || true
      - name: Process
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SW_GIT_TOKEN: ${{ secrets.SW_GIT_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          SW_REPO: ${{ github.repository }}
          SW_METRICS_FILE: ${{ github.workspace }}/.flow-metrics.jsonl
          PYTHONUNBUFFERED: "1"
        run: python -m flow.coordinator merge-queue

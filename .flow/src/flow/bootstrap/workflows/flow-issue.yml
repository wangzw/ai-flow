name: flow-issue
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: flow-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    if: github.event.label.name == 'agent-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Install ai-flow
        run: pip install -e ./.flow

      - name: Dispatch
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SW_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          SW_REPO: ${{ github.repository }}
          SW_ISSUE_NUMBER: ${{ github.event.issue.number }}
          SW_LABEL_ADDED: ${{ github.event.label.name }}
          SW_METRICS_FILE: ${{ github.workspace }}/.flow-metrics.jsonl
        run: python -m flow.coordinator issue-labeled

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifacts
          for d in /tmp/flow-*/repo/.flow-logs /tmp/flow-*/repo/.agent /tmp/flow-*/repo/.review /tmp/flow-*/.flow; do
            if [ -d "$d" ]; then
              dest="artifacts/$(basename $(dirname $(dirname $d)))-$(basename $d)"
              cp -r "$d" "$dest" 2>/dev/null || true
            fi
          done
          [ -f .flow-metrics.jsonl ] && cp .flow-metrics.jsonl artifacts/ || true
          ls -la artifacts/ || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flow-issue-${{ github.event.issue.number }}-run-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

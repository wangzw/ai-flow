name: flow-pr-ready
on:
  pull_request:
    types: [ready_for_review, opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: flow-pr-${{ github.event.inputs.pr_number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      - name: Install ai-flow
        run: pip install -e ./.flow
      - name: Dispatch
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLOW_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          ACTION_GITHUB_TOKEN: ${{ secrets.ACTION_GITHUB_TOKEN }}
          FLOW_REPO: ${{ github.repository }}
          FLOW_PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          FLOW_METRICS_FILE: ${{ github.workspace }}/.flow-metrics.jsonl
        run: python -m flow.coordinator pr-ready

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flow-pr-${{ github.event.inputs.pr_number || github.event.pull_request.number }}-run-${{ github.run_id }}
          path: |
            /tmp/flow-review-pr-*/host-logs
            /tmp/flow-review-pr-*/repo/.review
            /tmp/flow-review-pr-*/repo/.flow-logs
            .flow-metrics.jsonl
          if-no-files-found: ignore
          retention-days: 7

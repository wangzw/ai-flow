name: flow-merge-queue
on:
  pull_request:
    types: [labeled]
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: flow-merge-queue
  cancel-in-progress: false

jobs:
  process:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'merge-queued' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      - name: Install ai-flow
        run: pip install -e ./.flow
      - name: Process
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLOW_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          ACTION_GITHUB_TOKEN: ${{ secrets.ACTION_GITHUB_TOKEN }}
          FLOW_REPO: ${{ github.repository }}
          FLOW_METRICS_FILE: ${{ github.workspace }}/.flow-metrics.jsonl
        run: python -m flow.coordinator merge-queue

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifacts
          for d in /tmp/flow-merge-pr-*/host-logs /tmp/flow-merge-pr-*/repo/.review /tmp/flow-merge-pr-*/repo/.agent; do
            if [ -d "$d" ]; then
              dest="artifacts/$(basename $(dirname $(dirname $d)))-$(basename $d)"
              cp -r "$d" "$dest" 2>/dev/null || true
            fi
          done
          [ -f .flow-metrics.jsonl ] && cp .flow-metrics.jsonl artifacts/ || true
          ls -la artifacts/ || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flow-merge-queue-run-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

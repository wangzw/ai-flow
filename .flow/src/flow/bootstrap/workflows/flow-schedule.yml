name: flow-schedule
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ./.flow
      - name: Sweep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SW_REPO: ${{ github.repository }}
          PYTHONUNBUFFERED: "1"
        run: python -m flow.coordinator schedule

name: flow-comment
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: flow-comment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    if: contains(github.event.comment.body, '/agent ')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      - name: Install ai-flow
        run: pip install -e ./.flow
      - name: Dispatch
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLOW_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          ACTION_GITHUB_TOKEN: ${{ secrets.ACTION_GITHUB_TOKEN }}
          FLOW_REPO: ${{ github.repository }}
          FLOW_ISSUE_NUMBER: ${{ github.event.issue.number }}
          FLOW_COMMENT_BODY: ${{ github.event.comment.body }}
          FLOW_COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          FLOW_METRICS_FILE: ${{ github.workspace }}/.flow-metrics.jsonl
        run: python -m flow.coordinator comment-created
